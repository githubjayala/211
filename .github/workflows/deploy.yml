# .github/workflows/deploy.yml
name: Deploy to Production
on:
  push:
    branches:
      - master
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/211
            git pull origin master
            docker compose down
            docker compose up -d --build
            docker compose ps

      - name: Deploy Nginx config
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.APP_SERVER_IP }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.ANSIBLE_SSH_KEY }}
          script: |
            sudo cp ~/211/nginx/211.conf /etc/nginx/sites-enabled/211
            sudo nginx -t && sudo systemctl reload nginx

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Set up SSH key for Ansible
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.ANSIBLE_SSH_KEY }}

      - name: Add servers to known hosts
        run: |
          ssh-keyscan ${{ secrets.APP_SERVER_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan ${{ secrets.SECURITY_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Run Ansible hardening playbook
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml \
            ansible/playbooks/harden.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
          APP_SERVER_IP: ${{ secrets.APP_SERVER_IP }}
          SECURITY_SERVER_IP: ${{ secrets.SECURITY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

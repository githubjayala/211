# .github/workflows/deploy.yml
name: Deploy to Production
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to DigitalOcean
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd ~/211
            git pull origin master
            docker compose down
            docker compose up -d --build
            docker compose ps

      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      - name: Set up SSH key for Ansible
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.ANSIBLE_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.APP_SERVER_IP }} >> ~/.ssh/known_hosts
          ssh-keyscan ${{ secrets.SECURITY_SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Debug SSH key
        run: |
          echo "Key length: $(wc -c < ~/.ssh/id_rsa)"
          echo "Key first line: $(head -1 ~/.ssh/id_rsa)"
          echo "Key last line: $(tail -1 ~/.ssh/id_rsa)"
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o BatchMode=yes deploy@${{ secrets.APP_SERVER_IP }} echo "SSH works" || echo "SSH failed"
      
      - name: Run Ansible hardening playbook
        run: |
          ansible-playbook -i ansible/inventory/hosts.yml \
            ansible/playbooks/harden.yml
        env:
          ANSIBLE_HOST_KEY_CHECKING: False
          APP_SERVER_IP: ${{ secrets.APP_SERVER_IP }}
          SECURITY_SERVER_IP: ${{ secrets.SECURITY_SERVER_IP }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}

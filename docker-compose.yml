# Networks
networks:
  civic_net:
    driver: bridge

# Volumes
volumes:
  postgres_data:
  rabbitmq_data:

# Services
services:

  # Gateway (public entrypoint)
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile
    container_name: 211_gateway
    restart: unless-stopped
    env_file: .env.gateway
    depends_on:
      request-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      location-service:
        condition: service_healthy
      ticket-service:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:8000:8000"
    networks:
      - civic_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Request Service
  request-service:
    build:
      context: .
      dockerfile: request-service/Dockerfile
    container_name: 211_request_service
    restart: unless-stopped
    env_file: .env.request-service
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - civic_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: 211_notification_service
    restart: unless-stopped
    env_file: .env.notification-service
    expose:
      - "8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - civic_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Location Service
  location-service:
    build:
      context: .
      dockerfile: location-service/Dockerfile
    container_name: 211_location_service
    restart: unless-stopped
    env_file: .env.location-service
    expose:
      - "8000"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - civic_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Ticket Service
  ticket-service:
    build:
      context: .
      dockerfile: ticket-service/Dockerfile
    container_name: 211_ticket_service
    restart: unless-stopped
    env_file: .env.ticket-service
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - civic_net
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Postgres
  postgres:
    container_name: 211_postgres
    image: postgres:16
    restart: unless-stopped
    env_file: .env.postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - civic_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ
  rabbitmq:
    container_name: 211_rabbitmq
    image: rabbitmq:3-management
    env_file: .env.rabbitmq
    restart: unless-stopped
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - civic_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
